services:
    postgres:
        image: postgres:16
        container_name: app_db
        ports:
            - "5432:5432"
        environment:
            DB_HOST: postgres

        env_file:
          - .env
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app_network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5


    fastapi-app:
        build: .
        container_name: app
        restart: always
        ports:
            - "8000:8000"
        env_file:
            - .env
        environment:
            DB_HOST: postgres
            REDIS_HOST: redis-db
            APP_HOST : "0.0.0.0"
        depends_on:
            postgres:
                condition: service_healthy

        networks:
            - app_network

        volumes:
             - ./:/app

networks:
    app_network:
        driver: bridge

volumes:
    postgres_data: