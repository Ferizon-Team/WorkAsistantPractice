services:
    postgres:
        image: pgvector/pgvector:pg16
        container_name: work_asistant_app_db
        ports:
            - "5432:5432"
        dns:
            - 8.8.8.8
            - 8.8.4.4
        environment:
            DB_HOST: postgres
            POSTGRES_DB: ${DB_NAME:-database}
            POSTGRES_USER: ${DB_USER:-postgres}
            POSTGRES_PASSWORD: ${DB_PASS:-postgres}
            POSTGRES_HOST_AUTH_METHOD: trust

        env_file:
          - ./backend/.env
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
        networks:
            - app_network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:8-alpine
        container_name: work_asistant_redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        networks:
            - app_network
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    ollama:
        image: ollama/ollama:latest
        container_name: work_asistant_ollama
        volumes:
            - ollama_data:/root/.ollama
        ports:
            - "11434:11434"
        environment:
            - OLLAMA_HOST=0.0.0.0
            - OLLAMA_KEEP_ALIVE=24h
            - OLLAMA_NUM_PARALLEL=1
            - OLLAMA_MAX_LOADED_MODELS=1
            - OMP_NUM_THREADS=4
            - OLLAMA_CPU_ONLY=1
        env_file:
            - ./backend/.env
        networks:
            - app_network
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

        entrypoint: >
            sh -c "
              ollama serve &
              sleep 5 &&
              ollama pull qwen2.5:3b &&
              wait
            "
        restart: unless-stopped

    fastapi-app:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: work_asistant_app
        restart: always
        ports:
            - "8000:8000"
        dns:
            - 8.8.8.8
            - 8.8.4.4
        env_file:
            - ./backend/.env
        environment:
            DB_HOST: postgres
            REDIS_HOST: redis
        depends_on:
            postgres:
                condition: service_healthy

            redis:
                condition: service_healthy

        networks:
            - app_network
        volumes:
            - ./backend:/app
            - ./backend/models:/app/models_cache:ro
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: work_asistant_app_frontend
        restart: unless-stopped
        ports:
            - "3000:3000"
        env_file:
            - ./frontend/.env
        environment:
            - NUXT_PUBLIC_API_URL=http://localhost:8000
            - NUXT_PUBLIC_WS_URL=ws://localhost:8000
        depends_on:
            - fastapi-app
        networks:
            - app_network

        volumes:
            - ./frontend:/app
            - frontend_node_modules:/app/node_modules
        command: npm run dev

networks:
    app_network:
        driver: bridge

volumes:
    postgres_data:
    ollama_data:
        driver: local

    model_cache:
        driver: local

    redis_data:
        driver: local
    frontend_node_modules:
        driver: local